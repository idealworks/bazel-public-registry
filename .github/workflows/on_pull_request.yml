name: Pull Request Pipeline

on:
  pull_request:
    branches: [master]

jobs:
  validations:
    name: Validations run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Verify integrities
        run: ./scripts/ci/verify_integrities.py

  package-diff:
    name: Package version diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Diff changed package versions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: ./scripts/ci/diff_package_versions.py
      - name: Post diff as a sticky PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "package_diff_report.md";
            if (!fs.existsSync(path)) return;
            let body = fs.readFileSync(path, "utf8");
            const marker = "<!-- package-version-diff -->";
            const limit = 65000;
            if (body.length > limit) {
              body = body.slice(0, limit) + "\n\n_…report truncated (too large for a comment)._";
            }
            body = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
